<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lift Log"/>
<meta name="theme-color" content="#0d0d0d"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Lift Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#666;
  --accent:#E8FF47;--blue:#47BFFF;--red:#FF6B47;--green:#47FFB2;--purple:#C084FC;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;overscroll-behavior:none;}
#root{max-width:480px;margin:0 auto;}
.app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:13px 0 11px;background:none;border:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s;}
.nav-btn svg{width:19px;height:19px;}
.nav-btn.active{color:var(--accent);}
.header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.header-title{font-size:28px;font-weight:900;letter-spacing:.06em;line-height:1;}
.header-sub{font-size:13px;color:var(--muted);letter-spacing:.08em;margin-top:4px;font-weight:600;}
.home-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.workout-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;transition:background .1s;}
.workout-card:active{background:var(--bg3);}
.card-label{font-size:22px;font-weight:900;letter-spacing:.06em;line-height:1;}
.card-sub{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-top:5px;}
.card-accent{position:absolute;top:0;left:0;width:3px;height:100%;}
.full-width{grid-column:1/-1;}
.cardio-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
.cardio-card:active{background:var(--bg3);}
.workout-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.back-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;
  color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.08em;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-top:4px;}
.wh-title{font-size:30px;font-weight:900;letter-spacing:.06em;line-height:1;}
.wh-sub{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.06em;margin-top:3px;}
.exercise-list{padding:10px 16px;display:flex;flex-direction:column;gap:8px;}
.exercise-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.ex-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.ex-name{font-size:18px;font-weight:700;letter-spacing:.04em;}
.ex-last{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.sets-badge{background:var(--bg3);border-radius:4px;padding:3px 8px;font-size:12px;
  font-family:'JetBrains Mono',monospace;color:var(--muted);flex-shrink:0;}
.sets-badge.has{color:var(--accent);}
.ex-body{padding:0 16px 16px;border-top:1px solid var(--border);}
.type-tabs{display:flex;gap:6px;padding:14px 0 12px;}
.type-tab{flex:1;padding:8px 4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.07em;cursor:pointer;text-align:center;transition:all .1s;}
.type-tab.a-std{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.07);}
.type-tab.a-ss{border-color:var(--purple);color:var(--purple);background:rgba(192,132,252,.07);}
.type-tab.a-myo{border-color:var(--blue);color:var(--blue);background:rgba(71,191,255,.07);}
.input-row{display:flex;gap:10px;margin-bottom:10px;}
.input-group{flex:1;}
.input-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.1em;margin-bottom:6px;}
.stepper{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.stepper-btn{background:none;border:none;color:var(--text);padding:10px 14px;cursor:pointer;font-size:18px;font-weight:600;line-height:1;flex-shrink:0;}
.stepper-btn:active{background:var(--border);}
.stepper-val{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;
  background:none;border:none;color:var(--text);width:100%;padding:10px 0;}
.stepper-val:focus{outline:none;}
.log-btn{width:100%;padding:13px;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:900;letter-spacing:.1em;cursor:pointer;transition:opacity .1s;margin-bottom:2px;}
.log-btn:active{opacity:.8;}
.log-btn.green{background:var(--green);color:#0d0d0d;}
.log-btn.blue{background:var(--blue);color:#0d0d0d;}
.log-btn.purple{background:var(--purple);color:#0d0d0d;}
.log-btn.ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);margin-top:8px;}
.logged-sets{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.logged-set{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;background:var(--bg3);border-radius:5px;}
.set-num{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;width:36px;flex-shrink:0;padding-top:2px;}
.set-data{font-family:'JetBrains Mono',monospace;font-size:13px;flex:1;line-height:1.6;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 6px;font-size:16px;}
.del-btn:hover{color:var(--red);}
.ss-divider{display:flex;align-items:center;gap:8px;margin:10px 0;}
.ss-divider-line{flex:1;height:1px;background:var(--border);}
.ss-divider-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--purple);}
.ex-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;margin-bottom:10px;}
.ex-input:focus{outline:none;border-color:var(--purple);}
.ex-input::placeholder{color:var(--muted);}
.phase-label{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--blue);margin-bottom:8px;}
.phase-hint{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.act-done{background:rgba(71,191,255,.08);border:1px solid rgba(71,191,255,.3);border-radius:6px;padding:10px 14px;margin-bottom:12px;}
.act-done-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--blue);margin-bottom:3px;}
.act-done-val{font-family:'JetBrains Mono',monospace;font-size:15px;}
.mini-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.mini-chip{background:var(--bg3);border:1px solid rgba(71,191,255,.4);border-radius:4px;
  padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue);cursor:pointer;}
.sub-view{padding:16px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--muted);margin-bottom:10px;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 6px;
  text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:all .1s;}
.chip.sel-green{border-color:var(--green);color:var(--green);background:rgba(71,255,178,.07);}
.field-group{margin-bottom:14px;}
.field-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:12px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;}
.field-input:focus{outline:none;border-color:var(--muted);}
.field-input::placeholder{color:var(--muted);}
.done-msg{text-align:center;font-weight:900;font-size:18px;letter-spacing:.1em;padding:14px;}
.progress-view,.export-view{padding:16px;}
.ex-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:13px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;
  font-weight:600;margin-bottom:16px;appearance:none;cursor:pointer;}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 8px 8px;margin-bottom:16px;overflow:hidden;}
.chart-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--muted);padding:0 8px;margin-bottom:12px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 12px;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;}
.stat-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-top:3px;}
.no-data{text-align:center;color:var(--muted);font-size:15px;font-weight:600;padding:40px 0;letter-spacing:.06em;}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;}
.hist-date{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.year-nav{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 16px;color:var(--text);font-size:18px;cursor:pointer;font-weight:700;}
.year-lbl{font-size:22px;font-weight:900;letter-spacing:.08em;}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.month-chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 6px;
  text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:all .1s;}
.month-chip.sel{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.07);}
.export-summary{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.export-summary-title{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:10px;}
.ex-stat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.ex-stat:last-child{border-bottom:none;}
.ex-stat-lbl{font-size:14px;font-weight:600;color:var(--muted);}
.ex-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;}
.export-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.1em;
  color:#0d0d0d;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .1s;}
.export-btn:active{opacity:.85;}
.export-btn:disabled{opacity:.35;cursor:not-allowed;}
.export-btn.ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border);margin-top:10px;font-size:15px;padding:13px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0d0d0d;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.1em;
  padding:10px 20px;border-radius:6px;z-index:200;pointer-events:none;white-space:nowrap;
  animation:fadeup .25s ease,fadeout .3s ease 1.3s forwards;}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeout{to{opacity:0}}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
select option{background:#1f1f1f;}
</style>
</head>
<body>
<div id="root"></div>

<!-- Dependencies -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

const WORKOUTS = [
  { id:"push-a", label:"PUSH A", sub:"Chest · Shoulders · Tris", color:"#E8FF47",
    exercises:["Bench Press","Overhead Press","Incline DB Press","Tricep Pushdown","Lateral Raise"] },
  { id:"push-b", label:"PUSH B", sub:"Shoulders · Chest · Tris", color:"#E8FF47",
    exercises:["DB Shoulder Press","Cable Fly","Dips","Skull Crushers","Face Pull"] },
  { id:"pull-a", label:"PULL A", sub:"Back · Biceps", color:"#47BFFF",
    exercises:["Deadlift","Pull-Ups","Barbell Row","Face Pull","Bicep Curl"] },
  { id:"pull-b", label:"PULL B", sub:"Back · Biceps", color:"#47BFFF",
    exercises:["Romanian Deadlift","Lat Pulldown","Seated Cable Row","Hammer Curl","Rear Delt Fly"] },
  { id:"legs-a", label:"LEGS A", sub:"Quads · Hamstrings · Calves", color:"#FF6B47",
    exercises:["Back Squat","Leg Press","Romanian Deadlift","Leg Curl","Calf Raise"] },
  { id:"legs-b", label:"LEGS B", sub:"Glutes · Quads · Hams", color:"#FF6B47",
    exercises:["Bulgarian Split Squat","Hack Squat","Leg Extension","Hip Thrust","Leg Curl"] },
];

const CARDIO_TYPES = ["Running","Cycling","Rowing","Jump Rope","Stair Climber","Other"];
const SET_TYPES = ["STANDARD","SUPERSET","MYO-REP"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Storage — localStorage (persists on device, never expires unless user clears browser data)
function loadData() {
  try { const r = localStorage.getItem("liftlog-v1"); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveData(logs) {
  try { localStorage.setItem("liftlog-v1", JSON.stringify(logs)); } catch {}
}
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

// Icons
const IcoHome = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const IcoChart = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
const IcoClock = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const IcoDl = ({size=20}) => <svg style={{width:size,height:size}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

// Stepper
function Stepper({value, onChange, step=1, min=0}) {
  return (
    <div className="stepper">
      <button className="stepper-btn" onClick={()=>onChange(Math.max(min,+(value-step).toFixed(2)))}>−</button>
      <input className="stepper-val" type="number" value={value} onChange={e=>onChange(parseFloat(e.target.value)||0)}/>
      <button className="stepper-btn" onClick={()=>onChange(+(value+step).toFixed(2))}>+</button>
    </div>
  );
}

// Set row
function SetRow({entry, index, onDel}) {
  let body;
  if (entry.setType==="superset") {
    body = <><span style={{color:"var(--purple)",fontWeight:700}}>SS </span>{entry.ex1Name}: {entry.ex1Weight}lb×{entry.ex1Reps} + {entry.ex2Name}: {entry.ex2Weight}lb×{entry.ex2Reps}</>;
  } else if (entry.setType==="myorep") {
    body = <><span style={{color:"var(--blue)",fontWeight:700}}>MYO </span>{entry.weight}lb | Act:{entry.activationReps}{entry.miniSets?.length?" + "+entry.miniSets.join("/"):""}</>;
  } else {
    body = <>{entry.weight}lb × {entry.reps}</>;
  }
  return (
    <div className="logged-set">
      <span className="set-num">SET {index+1}</span>
      <span className="set-data">{body}</span>
      <button className="del-btn" onClick={onDel}>×</button>
    </div>
  );
}

// Standard logger
function StdLogger({exName, logs, onLog, color}) {
  const last = [...logs].filter(l=>l.exercise===exName&&l.setType==="standard").sort((a,b)=>b.date.localeCompare(a.date))[0];
  const [w, setW] = useState(last?.weight??45);
  const [r, setR] = useState(last?.reps??8);
  const n = logs.filter(l=>l.date===today()&&l.exercise===exName).length;
  return (
    <>
      <div className="input-row">
        <div className="input-group"><div className="input-label">WEIGHT (lb)</div><Stepper value={w} onChange={setW} step={5}/></div>
        <div className="input-group"><div className="input-label">REPS</div><Stepper value={r} onChange={setR} step={1} min={1}/></div>
      </div>
      <button className="log-btn" style={{background:color,color:"#0d0d0d"}}
        onClick={()=>onLog({exercise:exName,setType:"standard",weight:w,reps:r,date:today(),ts:Date.now()})}>
        LOG SET {n+1}
      </button>
    </>
  );
}

// Superset logger
function SSLogger({exName, onLog}) {
  const [w1,setW1]=useState(45);const [r1,setR1]=useState(8);
  const [ex2,setEx2]=useState("");const [w2,setW2]=useState(45);const [r2,setR2]=useState(8);
  return (
    <>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",color:"var(--purple)",marginBottom:8}}>EXERCISE 1: {exName.toUpperCase()}</div>
      <div className="input-row">
        <div className="input-group"><div className="input-label">WEIGHT (lb)</div><Stepper value={w1} onChange={setW1} step={5}/></div>
        <div className="input-group"><div className="input-label">REPS</div><Stepper value={r1} onChange={setR1} step={1} min={1}/></div>
      </div>
      <div className="ss-divider"><div className="ss-divider-line"/><span className="ss-divider-lbl">PAIRED WITH</span><div className="ss-divider-line"/></div>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",color:"var(--purple)",marginBottom:8}}>EXERCISE 2</div>
      <input className="ex-input" placeholder="Exercise name..." value={ex2} onChange={e=>setEx2(e.target.value)}/>
      <div className="input-row">
        <div className="input-group"><div className="input-label">WEIGHT (lb)</div><Stepper value={w2} onChange={setW2} step={5}/></div>
        <div className="input-group"><div className="input-label">REPS</div><Stepper value={r2} onChange={setR2} step={1} min={1}/></div>
      </div>
      <button className="log-btn purple"
        onClick={()=>{if(!ex2.trim())return;onLog({exercise:exName,setType:"superset",ex1Name:exName,ex1Weight:w1,ex1Reps:r1,ex2Name:ex2.trim(),ex2Weight:w2,ex2Reps:r2,date:today(),ts:Date.now()});}}>
        LOG SUPERSET
      </button>
    </>
  );
}

// Myo-rep logger
function MyoLogger({exName, onLog}) {
  const [w,setW]=useState(45);const [actReps,setActReps]=useState(15);
  const [phase,setPhase]=useState("act");
  const [savedW,setSavedW]=useState(45);const [savedAct,setSavedAct]=useState(15);
  const [miniReps,setMiniReps]=useState(5);const [miniSets,setMiniSets]=useState([]);

  if (phase==="act") return (
    <>
      <div className="phase-label">ACTIVATION SET</div>
      <div className="phase-hint">High-rep set to near failure. Rest 5-10 sec, then add mini-sets.</div>
      <div className="input-row">
        <div className="input-group"><div className="input-label">WEIGHT (lb)</div><Stepper value={w} onChange={setW} step={5}/></div>
        <div className="input-group"><div className="input-label">REPS</div><Stepper value={actReps} onChange={setActReps} step={1} min={1}/></div>
      </div>
      <button className="log-btn blue" onClick={()=>{setSavedW(w);setSavedAct(actReps);setMiniSets([]);setPhase("mini");}}>DONE — ADD MINI-SETS →</button>
    </>
  );
  return (
    <>
      <div className="act-done">
        <div className="act-done-lbl">ACTIVATION ✓</div>
        <div className="act-done-val">{savedW}lb × {savedAct} reps</div>
      </div>
      <div className="phase-label">MINI-SETS ({miniSets.length})</div>
      {miniSets.length>0 && <div className="mini-chips">{miniSets.map((r,i)=><span key={i} className="mini-chip" onClick={()=>setMiniSets(p=>p.filter((_,j)=>j!==i))}>{r}r ×</span>)}</div>}
      <div className="input-row">
        <div className="input-group"><div className="input-label">MINI-SET REPS</div><Stepper value={miniReps} onChange={setMiniReps} step={1} min={1}/></div>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}><button className="log-btn blue" onClick={()=>setMiniSets(p=>[...p,miniReps])}>+ MINI-SET</button></div>
      </div>
      <button className="log-btn ghost" onClick={()=>{onLog({exercise:exName,setType:"myorep",weight:savedW,activationReps:savedAct,miniSets,date:today(),ts:Date.now()});setPhase("act");setMiniSets([]);}}>FINISH MYO-REP BLOCK ✓</button>
    </>
  );
}

// Exercise item
function ExItem({name, logs, onLog, onDel, color}) {
  const [open,setOpen]=useState(false);
  const [st,setST]=useState("STANDARD");
  const todayLogs=logs.filter(l=>l.date===today()&&l.exercise===name);
  const last=[...logs].filter(l=>l.exercise===name&&l.setType==="standard").sort((a,b)=>b.date.localeCompare(a.date))[0];
  return (
    <div className="exercise-item">
      <div className="ex-header" onClick={()=>setOpen(o=>!o)}>
        <div>
          <div className="ex-name">{name}</div>
          {last&&<div className="ex-last">{last.weight}lb × {last.reps} last time</div>}
        </div>
        <div className={`sets-badge${todayLogs.length?" has":""}`}>{todayLogs.length>0?`${todayLogs.length} SET${todayLogs.length>1?"S":""}`:"LOG"}</div>
      </div>
      {open&&(
        <div className="ex-body">
          <div className="type-tabs">
            {SET_TYPES.map(t=>{
              const c=t==="STANDARD"?"a-std":t==="SUPERSET"?"a-ss":"a-myo";
              return <button key={t} className={`type-tab${st===t?" "+c:""}`} onClick={()=>setST(t)}>{t}</button>;
            })}
          </div>
          {st==="STANDARD"&&<StdLogger exName={name} logs={logs} onLog={onLog} color={color}/>}
          {st==="SUPERSET"&&<SSLogger exName={name} onLog={onLog}/>}
          {st==="MYO-REP"&&<MyoLogger exName={name} onLog={onLog}/>}
          {todayLogs.length>0&&<div className="logged-sets">{todayLogs.map((s,i)=><SetRow key={s.ts} entry={s} index={i} onDel={()=>onDel(s.ts)}/>)}</div>}
        </div>
      )}
    </div>
  );
}

// Workout view
function WorkoutView({workout, logs, onLog, onDel, onBack}) {
  return (
    <div>
      <div className="workout-header">
        <button className="back-btn" onClick={onBack}>← BACK</button>
        <div><div className="wh-title">{workout.label}</div><div className="wh-sub">{workout.sub}</div></div>
      </div>
      <div className="exercise-list">
        {workout.exercises.map(ex=><ExItem key={ex} name={ex} logs={logs} onLog={onLog} onDel={onDel} color={workout.color}/>)}
      </div>
    </div>
  );
}

// Cardio view
function CardioView({onLog, onBack}) {
  const [type,setType]=useState(CARDIO_TYPES[0]);
  const [dur,setDur]=useState(30);const [dist,setDist]=useState("");const [notes,setNotes]=useState("");const [done,setDone]=useState(false);
  return (
    <div>
      <div className="workout-header"><button className="back-btn" onClick={onBack}>← BACK</button><div><div className="wh-title">CARDIO</div><div className="wh-sub">Track your session</div></div></div>
      <div className="sub-view">
        <div className="sec-label">Activity</div>
        <div className="type-grid">{CARDIO_TYPES.map(t=><div key={t} className={`chip${type===t?" sel-green":""}`} onClick={()=>setType(t)}>{t}</div>)}</div>
        <div className="sec-label">Duration (min)</div>
        <div style={{marginBottom:14}}><Stepper value={dur} onChange={setDur} step={5} min={5}/></div>
        <div className="field-group"><div className="sec-label">Distance (optional)</div><input className="field-input" placeholder="e.g. 3.1 miles" value={dist} onChange={e=>setDist(e.target.value)}/></div>
        <div className="field-group"><div className="sec-label">Notes</div><input className="field-input" placeholder="How'd it feel?" value={notes} onChange={e=>setNotes(e.target.value)}/></div>
        {!done?<button className="log-btn green" onClick={()=>{onLog({exercise:`Cardio: ${type}`,setType:"cardio",duration:dur,distance:dist,notes,date:today(),ts:Date.now()});setDone(true);}}>LOG SESSION</button>
          :<div className="done-msg" style={{color:"var(--green)"}}>✓ SESSION LOGGED</div>}
      </div>
    </div>
  );
}

// Mobility view
function MobilityView({onLog, onBack}) {
  const [dur,setDur]=useState(15);const [notes,setNotes]=useState("");const [done,setDone]=useState(false);
  return (
    <div>
      <div className="workout-header"><button className="back-btn" onClick={onBack}>← BACK</button><div><div className="wh-title">MOBILITY</div><div className="wh-sub">Stretching · Yoga · Recovery</div></div></div>
      <div className="sub-view">
        <div className="sec-label">Duration (min)</div>
        <div style={{marginBottom:16}}><Stepper value={dur} onChange={setDur} step={5} min={5}/></div>
        <div className="field-group"><div className="sec-label">Notes</div><input className="field-input" placeholder="What did you work on?" value={notes} onChange={e=>setNotes(e.target.value)}/></div>
        {!done?<button className="log-btn blue" onClick={()=>{onLog({exercise:"Mobility",setType:"mobility",duration:dur,notes,date:today(),ts:Date.now()});setDone(true);}}>LOG SESSION</button>
          :<div className="done-msg" style={{color:"var(--blue)"}}>✓ SESSION LOGGED</div>}
      </div>
    </div>
  );
}

// Progress view
function ProgressView({logs}) {
  const [sel,setSel]=useState(WORKOUTS[0].exercises[0]);
  const exLogs=logs.filter(l=>l.exercise===sel&&l.setType==="standard").sort((a,b)=>a.date.localeCompare(b.date));
  const byDate={};exLogs.forEach(l=>{if(!byDate[l.date]||l.weight>byDate[l.date].weight)byDate[l.date]=l;});
  const chartData=Object.values(byDate).map(l=>({date:fmtDate(l.date),weight:l.weight}));
  const allW=exLogs.map(l=>l.weight);
  const maxW=allW.length?Math.max(...allW):0;
  const delta=allW.length>1?maxW-allW[0]:0;
  const recentDates=[...new Set(exLogs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a)).slice(0,5);
  return (
    <div className="progress-view">
      <select className="ex-select" value={sel} onChange={e=>setSel(e.target.value)}>
        {WORKOUTS.map(w=><optgroup key={w.id} label={w.label}>{w.exercises.map(ex=><option key={ex}>{ex}</option>)}</optgroup>)}
      </select>
      {chartData.length===0?<div className="no-data">No data yet</div>:(<>
        <div className="stat-row">
          <div className="stat-box"><div className="stat-val">{maxW}<span style={{fontSize:12,color:"var(--muted)"}}>lb</span></div><div className="stat-lbl">PR</div></div>
          <div className="stat-box"><div className="stat-val">{exLogs.length}</div><div className="stat-lbl">SETS</div></div>
          <div className="stat-box"><div className="stat-val" style={{color:delta>0?"var(--green)":delta<0?"var(--red)":"var(--text)"}}>{delta>0?"+":""}{delta}<span style={{fontSize:12,color:"var(--muted)"}}>lb</span></div><div className="stat-lbl">GAIN</div></div>
        </div>
        <div className="chart-wrap">
          <div className="chart-title">MAX WEIGHT PER SESSION</div>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={chartData} margin={{left:0,right:16,top:4,bottom:4}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#222"/>
              <XAxis dataKey="date" tick={{fill:"#666",fontSize:10,fontFamily:"Barlow Condensed"}}/>
              <YAxis tick={{fill:"#666",fontSize:10,fontFamily:"JetBrains Mono"}} width={36} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{background:"#1f1f1f",border:"1px solid #2a2a2a",borderRadius:6,fontFamily:"Barlow Condensed",fontSize:13}}
                labelStyle={{color:"#f0f0f0",fontWeight:700}} itemStyle={{color:"#E8FF47"}} formatter={v=>[`${v} lb`,"Weight"]}/>
              <Line type="monotone" dataKey="weight" stroke="#E8FF47" strokeWidth={2} dot={{r:3,fill:"#E8FF47"}} activeDot={{r:5}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div className="sec-label" style={{marginBottom:10}}>RECENT SESSIONS</div>
        {recentDates.map(date=>{
          const ds=exLogs.filter(l=>l.date===date);
          return <div className="hist-item" key={date}><div className="hist-date">{fmtDate(date)}</div>{ds.map((s,i)=><div key={s.ts} style={{fontFamily:"JetBrains Mono",fontSize:13,marginTop:3}}>Set {i+1}: {s.weight}lb × {s.reps}</div>)}</div>;
        })}
      </>)}
    </div>
  );
}

// Export
function buildRows(logs) {
  return logs.map(l=>{
    if(l.setType==="standard") return {Date:l.date,Type:"Standard",Exercise:l.exercise,Weight:l.weight,Reps:l.reps,Notes:""};
    if(l.setType==="superset") return {Date:l.date,Type:"Superset",Exercise:`${l.ex1Name} + ${l.ex2Name}`,Weight:`${l.ex1Weight}/${l.ex2Weight}`,Reps:`${l.ex1Reps}/${l.ex2Reps}`,Notes:""};
    if(l.setType==="myorep") return {Date:l.date,Type:"Myo-Rep",Exercise:l.exercise,Weight:l.weight,Reps:l.activationReps,Notes:`Mini: ${l.miniSets?.join(",")||""}`};
    if(l.setType==="cardio") return {Date:l.date,Type:"Cardio",Exercise:l.exercise,Weight:"",Reps:"",Notes:`${l.duration}min${l.distance?" / "+l.distance:""}${l.notes?" / "+l.notes:""}`};
    if(l.setType==="mobility") return {Date:l.date,Type:"Mobility",Exercise:"Mobility",Weight:"",Reps:"",Notes:`${l.duration}min${l.notes?" / "+l.notes:""}`};
    return {Date:l.date,Type:"?",Exercise:l.exercise||"",Weight:"",Reps:"",Notes:""};
  });
}
function buildPRs(logs) {
  const exercises=[...new Set(logs.filter(l=>l.setType==="standard").map(l=>l.exercise))];
  return exercises.map(ex=>{
    const ls=logs.filter(l=>l.exercise===ex&&l.setType==="standard");
    const pr=[...ls].sort((a,b)=>b.weight-a.weight)[0];
    return {Exercise:ex,"PR Weight (lb)":pr?.weight??""," PR Reps":pr?.reps??"","PR Date":pr?.date??"","Total Sets":ls.length};
  });
}
function doExport(logs, label) {
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(buildRows(logs));
  ws1["!cols"]=[{wch:12},{wch:10},{wch:30},{wch:10},{wch:8},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws1,"Log");
  const prs=buildPRs(logs);
  if(prs.length){const ws2=XLSX.utils.json_to_sheet(prs);ws2["!cols"]=[{wch:28},{wch:16},{wch:10},{wch:12},{wch:12}];XLSX.utils.book_append_sheet(wb,ws2,"PRs");}
  XLSX.writeFile(wb,`LiftLog_${label}.xlsx`);
}

function ExportView({logs}) {
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const mStr=`${year}-${String(month+1).padStart(2,"0")}`;
  const mLogs=logs.filter(l=>l.date.startsWith(mStr));
  const days=[...new Set(mLogs.map(l=>l.date))].length;
  const sets=mLogs.filter(l=>l.setType==="standard").length;
  const cardio=mLogs.filter(l=>l.setType==="cardio").length;
  return (
    <div className="export-view">
      <div className="sec-label" style={{marginBottom:14}}>SELECT MONTH</div>
      <div className="year-row">
        <button className="year-nav" onClick={()=>setYear(y=>y-1)}>‹</button>
        <span className="year-lbl">{year}</span>
        <button className="year-nav" onClick={()=>setYear(y=>y+1)}>›</button>
      </div>
      <div className="month-grid">{MONTHS.map((m,i)=><div key={m} className={`month-chip${month===i?" sel":""}`} onClick={()=>setMonth(i)}>{m}</div>)}</div>
      <div className="export-summary">
        <div className="export-summary-title">{MONTHS[month].toUpperCase()} {year} — SUMMARY</div>
        <div className="ex-stat"><span className="ex-stat-lbl">Training Days</span><span className="ex-stat-val">{days}</span></div>
        <div className="ex-stat"><span className="ex-stat-lbl">Lifting Sets</span><span className="ex-stat-val">{sets}</span></div>
        <div className="ex-stat"><span className="ex-stat-lbl">Cardio Sessions</span><span className="ex-stat-val">{cardio}</span></div>
        <div className="ex-stat"><span className="ex-stat-lbl">Total Entries</span><span className="ex-stat-val">{mLogs.length}</span></div>
      </div>
      <button className="export-btn" disabled={mLogs.length===0} onClick={()=>doExport(mLogs,`${MONTHS[month]}_${year}`)}>
        <IcoDl size={22}/> EXPORT {MONTHS[month].toUpperCase()} {year}
      </button>
      <button className="export-btn ghost" onClick={()=>doExport(logs,"All_Time")}>↓  Export All-Time Data</button>
    </div>
  );
}

// Main App
function App() {
  const [tab,setTab]=useState("home");
  const [view,setView]=useState(null);
  const [logs,setLogs]=useState(()=>loadData());
  const [toast,setToast]=useState(null);
  const [toastKey,setToastKey]=useState(0);

  const handleLog=useCallback((entry)=>{
    const next=[...logs,entry];
    setLogs(next);saveData(next);
    const msg=entry.setType==="standard"?`${entry.weight}lb × ${entry.reps} ✓`
      :entry.setType==="superset"?"SUPERSET LOGGED ✓"
      :entry.setType==="myorep"?"MYO-REP BLOCK ✓"
      :entry.setType==="cardio"?"CARDIO LOGGED ✓":"SESSION LOGGED ✓";
    setToast(msg);setToastKey(k=>k+1);
    setTimeout(()=>setToast(null),1700);
  },[logs]);

  const handleDel=useCallback((ts)=>{
    const next=logs.filter(l=>l.ts!==ts);setLogs(next);saveData(next);
  },[logs]);

  const todayN=[...new Set(logs.filter(l=>l.date===today()).map(l=>l.exercise))].length;

  return (
    <>
      {toast&&<div className="toast" key={toastKey}>{toast}</div>}
      <div className="app">
        {view?(
          <>
            {view.type==="workout"&&<WorkoutView workout={view.workout} logs={logs} onLog={handleLog} onDel={handleDel} onBack={()=>setView(null)}/>}
            {view.type==="cardio"&&<CardioView onLog={handleLog} onBack={()=>setView(null)}/>}
            {view.type==="mobility"&&<MobilityView onLog={handleLog} onBack={()=>setView(null)}/>}
          </>
        ):(
          <>
            {tab==="home"&&<>
              <div className="header">
                <div className="header-title">LIFT LOG</div>
                <div className="header-sub">{todayN>0?`${todayN} exercise${todayN>1?"s":""} logged today`:"READY TO TRAIN"}</div>
              </div>
              <div className="home-grid">
                {WORKOUTS.map(w=>(
                  <div key={w.id} className="workout-card" onClick={()=>setView({type:"workout",workout:w})}>
                    <div className="card-accent" style={{background:w.color}}/>
                    <div className="card-label" style={{color:w.color}}>{w.label}</div>
                    <div className="card-sub">{w.sub}</div>
                  </div>
                ))}
                <div className="cardio-card full-width" onClick={()=>setView({type:"cardio"})}>
                  <div><div className="card-label" style={{color:"var(--green)"}}>CARDIO</div><div className="card-sub">Running · Cycling · Rowing · More</div></div>
                  <span style={{color:"var(--muted)",fontSize:20}}>›</span>
                </div>
                <div className="cardio-card full-width" onClick={()=>setView({type:"mobility"})}>
                  <div><div className="card-label" style={{color:"var(--blue)"}}>MOBILITY</div><div className="card-sub">Stretching · Yoga · Recovery</div></div>
                  <span style={{color:"var(--muted)",fontSize:20}}>›</span>
                </div>
              </div>
            </>}
            {tab==="progress"&&<>
              <div className="header"><div className="header-title">PROGRESS</div><div className="header-sub">TRACK YOUR GAINS</div></div>
              <ProgressView logs={logs}/>
            </>}
            {tab==="history"&&<>
              <div className="header"><div className="header-title">HISTORY</div><div className="header-sub">ALL SESSIONS</div></div>
              <div style={{padding:16}}>
                {(()=>{
                  const dates=[...new Set(logs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a)).slice(0,30);
                  if(!dates.length) return <div className="no-data">No sessions logged yet</div>;
                  return dates.map(date=>{
                    const exes=[...new Set(logs.filter(l=>l.date===date).map(l=>l.exercise))];
                    return <div className="hist-item" key={date}>
                      <div className="hist-date">{fmtDate(date)}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                        {exes.map(ex=><span key={ex} style={{background:"var(--bg3)",borderRadius:4,padding:"3px 8px",fontSize:13,fontWeight:700}}>{ex}</span>)}
                      </div>
                    </div>;
                  });
                })()}
              </div>
            </>}
            {tab==="export"&&<>
              <div className="header"><div className="header-title">EXPORT</div><div className="header-sub">DOWNLOAD AS SPREADSHEET</div></div>
              <ExportView logs={logs}/>
            </>}
          </>
        )}
        {!view&&(
          <nav className="nav">
            <button className={`nav-btn${tab==="home"?" active":""}`} onClick={()=>setTab("home")}><IcoHome/>HOME</button>
            <button className={`nav-btn${tab==="progress"?" active":""}`} onClick={()=>setTab("progress")}><IcoChart/>PROGRESS</button>
            <button className={`nav-btn${tab==="history"?" active":""}`} onClick={()=>setTab("history")}><IcoClock/>HISTORY</button>
            <button className={`nav-btn${tab==="export"?" active":""}`} onClick={()=>setTab("export")}><IcoDl/>EXPORT</button>
          </nav>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
