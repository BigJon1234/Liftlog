<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lift Log"/>
<meta name="theme-color" content="#0d0d0d"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Lift Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#666;
  --accent:#E8FF47;--blue:#47BFFF;--red:#FF6B47;--green:#47FFB2;--purple:#C084FC;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;overscroll-behavior:none;}
#root{max-width:480px;margin:0 auto;}
.app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom));}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:13px 0 11px;background:none;border:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s;}
.nav-btn svg{width:19px;height:19px;}
.nav-btn.active{color:var(--accent);}

.header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.header-title{font-size:28px;font-weight:900;letter-spacing:.06em;line-height:1;}
.header-sub{font-size:13px;color:var(--muted);letter-spacing:.08em;margin-top:4px;font-weight:600;}

.home-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.workout-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;transition:background .1s;}
.workout-card:active{background:var(--bg3);}
.card-label{font-size:22px;font-weight:900;letter-spacing:.06em;line-height:1;}
.card-sub{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-top:5px;}
.card-accent{position:absolute;top:0;left:0;width:3px;height:100%;}
.full-width{grid-column:1/-1;}
.cardio-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
.cardio-card:active{background:var(--bg3);}

.workout-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.back-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;
  color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.08em;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-top:4px;}
.wh-title{font-size:30px;font-weight:900;letter-spacing:.06em;line-height:1;}
.wh-sub{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.06em;margin-top:3px;}

.exercise-list{padding:10px 16px;display:flex;flex-direction:column;gap:8px;}
.exercise-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.ex-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.ex-name{font-size:18px;font-weight:700;letter-spacing:.04em;}
.ex-last{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.sets-badge{background:var(--bg3);border-radius:4px;padding:3px 8px;font-size:12px;
  font-family:'JetBrains Mono',monospace;color:var(--muted);flex-shrink:0;}
.sets-badge.has{color:var(--accent);}
.ex-body{padding:0 16px 16px;border-top:1px solid var(--border);}

.type-tabs{display:flex;gap:6px;padding:14px 0 12px;}
.type-tab{flex:1;padding:8px 4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.07em;cursor:pointer;text-align:center;transition:all .1s;}
.type-tab.a-std{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.07);}
.type-tab.a-ss{border-color:var(--purple);color:var(--purple);background:rgba(192,132,252,.07);}
.type-tab.a-myo{border-color:var(--blue);color:var(--blue);background:rgba(71,191,255,.07);}

.input-row{display:flex;gap:10px;margin-bottom:10px;}
.input-group{flex:1;}
.input-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.1em;margin-bottom:6px;}
.stepper{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.stepper-btn{background:none;border:none;color:var(--text);padding:10px 14px;cursor:pointer;font-size:18px;font-weight:600;line-height:1;flex-shrink:0;}
.stepper-btn:active{background:var(--border);}
.stepper-val{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;
  background:none;border:none;color:var(--text);width:100%;padding:10px 0;}
.stepper-val:focus{outline:none;}

.log-btn{width:100%;padding:13px;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:900;letter-spacing:.1em;cursor:pointer;transition:opacity .1s;margin-bottom:2px;}
.log-btn:active{opacity:.8;}
.log-btn.green{background:var(--green);color:#0d0d0d;}
.log-btn.blue{background:var(--blue);color:#0d0d0d;}
.log-btn.purple{background:var(--purple);color:#0d0d0d;}
.log-btn.ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);margin-top:8px;}

.logged-sets{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.logged-set{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;background:var(--bg3);border-radius:5px;}
.set-num{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;width:36px;flex-shrink:0;padding-top:2px;}
.set-data{font-family:'JetBrains Mono',monospace;font-size:13px;flex:1;line-height:1.6;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 6px;font-size:16px;}
.del-btn:hover{color:var(--red);}

.ss-divider{display:flex;align-items:center;gap:8px;margin:10px 0;}
.ss-divider-line{flex:1;height:1px;background:var(--border);}
.ss-divider-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--purple);}
.ex-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;margin-bottom:10px;}
.ex-input:focus{outline:none;border-color:var(--purple);}
.ex-input::placeholder{color:var(--muted);}

.phase-label{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--blue);margin-bottom:8px;}
.phase-hint{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.act-done{background:rgba(71,191,255,.08);border:1px solid rgba(71,191,255,.3);border-radius:6px;padding:10px 14px;margin-bottom:12px;}
.act-done-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--blue);margin-bottom:3px;}
.act-done-val{font-family:'JetBrains Mono',monospace;font-size:15px;}
.mini-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.mini-chip{background:var(--bg3);border:1px solid rgba(71,191,255,.4);border-radius:4px;
  padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue);cursor:pointer;}

.sub-view{padding:16px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--muted);margin-bottom:10px;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 6px;
  text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:all .1s;}
.chip.sel-green{border-color:var(--green);color:var(--green);background:rgba(71,255,178,.07);}
.field-group{margin-bottom:14px;}
.field-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:12px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;}
.field-input:focus{outline:none;border-color:var(--muted);}
.field-input::placeholder{color:var(--muted);}
.done-msg{text-align:center;font-weight:900;font-size:18px;letter-spacing:.1em;padding:14px;}

.progress-view,.export-view{padding:16px;}
.ex-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:13px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;
  font-weight:600;margin-bottom:16px;appearance:none;cursor:pointer;}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 8px 8px;margin-bottom:16px;overflow:hidden;}
.chart-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--muted);padding:0 8px;margin-bottom:12px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 12px;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;}
.stat-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-top:3px;}
.no-data{text-align:center;color:var(--muted);font-size:15px;font-weight:600;padding:40px 0;letter-spacing:.06em;}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;}
.hist-date{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}

.year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.year-nav{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 16px;color:var(--text);font-size:18px;cursor:pointer;font-weight:700;}
.year-lbl{font-size:22px;font-weight:900;letter-spacing:.08em;}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.month-chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 6px;
  text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:all .1s;}
.month-chip.sel{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.07);}
.export-summary{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.export-summary-title{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:10px;}
.ex-stat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.ex-stat:last-child{border-bottom:none;}
.ex-stat-lbl{font-size:14px;font-weight:600;color:var(--muted);}
.ex-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;}
.export-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.1em;
  color:#0d0d0d;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .1s;}
.export-btn:active{opacity:.85;}
.export-btn:disabled{opacity:.35;cursor:not-allowed;}
.export-btn.ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border);margin-top:10px;font-size:15px;padding:13px;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0d0d0d;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.1em;
  padding:10px 20px;border-radius:6px;z-index:200;pointer-events:none;white-space:nowrap;
  animation:fadeup .25s ease,fadeout .3s ease 1.3s forwards;}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeout{to{opacity:0}}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
select option{background:#1f1f1f;}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Barlow Condensed',sans-serif;color:#666;font-size:16px;letter-spacing:.1em;">LOADING...</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="./app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
